<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АТОМ Metrics – Вход / Регистрация</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-color);
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.1em;
            color: var(--text-light);
            transition: all 0.3s;
        }
        .auth-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            font-weight: 500;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-color);
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }
        .checkbox-group input {
            width: auto;
            margin-right: 8px;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-primary:hover {
            background: #155a8a;
        }
        .error-message {
            color: var(--danger-color);
            margin-top: 10px;
            text-align: center;
        }
        .success-message {
            color: var(--success-color);
            margin-top: 10px;
            text-align: center;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-light);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="auth-container">
            <h1 style="text-align:center; margin-bottom:20px;">🚗 АТОМ Metrics</h1>
            
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Вход</button>
                <button class="auth-tab" id="registerTab">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <div class="auth-form active" id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe" checked>
                    <label for="rememberMe">Запомнить меня</label>
                </div>
                <button class="btn-primary" id="loginBtn">Войти</button>
                <div id="loginError" class="error-message"></div>
            </div>

            <!-- Форма регистрации -->
            <div class="auth-form" id="registerForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="registerPassword" placeholder="••••••••">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="registerRemember" checked>
                    <label for="registerRemember">Запомнить меня</label>
                </div>
                <button class="btn-primary" id="registerBtn">Зарегистрироваться</button>
                <div id="registerError" class="error-message"></div>
                <div id="registerSuccess" class="success-message"></div>
            </div>

            <a href="index.html" class="back-link">← Вернуться на главную</a>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase/supabase-config.js';

        // Элементы DOM
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const loginError = document.getElementById('loginError');
        const registerError = document.getElementById('registerError');
        const registerSuccess = document.getElementById('registerSuccess');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const registerEmail = document.getElementById('registerEmail');
        const registerPassword = document.getElementById('registerPassword');
        const rememberMe = document.getElementById('rememberMe');
        const registerRemember = document.getElementById('registerRemember');

        // Переключение вкладок
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.classList.add('active');
            registerForm.classList.remove('active');
        });

        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.classList.add('active');
            loginForm.classList.remove('active');
        });

        // Функция для установки persistence
        function setPersistence(remember) {
            return remember 
                ? supabase.auth.setSession({ /* localStorage по умолчанию */ })
                : supabase.auth.setSession({ /* session storage */ });
        }

        // Вход
        loginBtn.addEventListener('click', async () => {
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();
            const remember = rememberMe.checked;

            if (!email || !password) {
                loginError.textContent = 'Заполните все поля';
                return;
            }

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // Успешный вход
                window.location.href = 'collect.html';
                localStorage.setItem('currentUserEmail', email);

            } catch (error) {
                loginError.textContent = error.message;
            }
        });

        // Регистрация
        registerBtn.addEventListener('click', async () => {
            const email = registerEmail.value.trim();
            const password = registerPassword.value.trim();
            const remember = registerRemember.checked;

            if (!email || !password) {
                registerError.textContent = 'Заполните все поля';
                return;
            }

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password
                });

                if (error) throw error;

                if (data.user) {
                    // 1. Создаем запись в user_progress
                    const { error: progressError } = await supabase
                        .from('user_progress')
                        .insert({ user_id: data.user.id, current_day: 1 });

                    if (progressError) {
                        console.error('Ошибка создания прогресса:', progressError);
                    }

                    // 2. СОЗДАЕМ ЗАПИСЬ В PROFILES (новая таблица)
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert({ 
                            user_id: data.user.id, 
                            email: email 
                        });

                    if (profileError) {
                        console.error('Ошибка создания профиля:', profileError);
                    }
                }

                registerSuccess.textContent = 'Регистрация успешна! Перенаправляем...';
                localStorage.setItem('currentUserEmail', email);
                
                // Автоматический вход после регистрации
                setTimeout(() => {
                    window.location.href = 'collect.html';
                }, 1500);
                
            } catch (error) {
                registerError.textContent = error.message;
            }
        });

        // Проверка сессии при загрузке
        (async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Если уже есть сессия, сразу переходим на collect.html
                window.location.href = 'collect.html';
            }
        })();
    </script>
</body>
</html>
