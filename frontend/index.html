<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АТОМ Metrics - Анализ открытий дверей</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

    <!-- Подключение основного скрипта -->
    <script src="script.js"></script>
    
    <!-- Подключение стилей (из той же папки) -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Подключение Chart.js для графиков -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Подключение Moment.js для работы с датами (опционально) -->
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    
    <style>
        /* Временные стили на случай, если styles.css не загрузится */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #f5f5f5; 
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Шапка -->
        <header>
            <h1>🚗 АТОМ Metrics</h1>
            <p>Анализ открытий дверей по тачпоинтам</p>
        </header>

        <!-- Навигация -->
        <nav>
            <a href="index.html" class="active">Главная</a>
            <a href="dashboard.html">Детальный дашборд</a>
        </nav>

        <!-- Индикатор загрузки -->
        <div id="loading" class="loading">
            Загрузка данных...
        </div>

        <!-- Блок со статистикой (заполняется через JavaScript) -->
        <div class="stats-cards" id="statsCards" style="display: none;">
            <!-- Карточки будут добавлены динамически -->
        </div>

        <!-- Сетка графиков -->
        <div class="charts-grid" id="chartsGrid" style="display: none;">
            <!-- График всех тачпоинтов -->
            <div class="chart-card">
                <h3>📈 Все тачпоинты</h3>
                <canvas id="allTouchpointsChart"></canvas>
            </div>
            
            <!-- Круговая диаграмма -->
            <div class="chart-card">
                <h3>🥧 Распределение</h3>
                <canvas id="pieChart"></canvas>
            </div>
            
            <!-- Суммарные открытия -->
            <div class="chart-card">
                <h3>📊 Суммарные открытия</h3>
                <canvas id="totalChart"></canvas>
            </div>
            
            <!-- Производные -->
            <div class="chart-card">
                <h3>📉 Производные (на 1 машину)</h3>
                <canvas id="derivativesChart"></canvas>
            </div>
        </div>

        <!-- Блок с последними данными -->
        <div class="data-table" id="dataTable" style="display: none;">
            <h3>📋 Последние 10 дней</h3>
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Кнопка</th>
                        <th>СВП</th>
                        <th>VA</th>
                        <th>Приложение</th>
                        <th>Всего</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Данные будут добавлены динамически -->
                </tbody>
            </table>
        </div>

        <!-- Блок с ошибкой (если данные не загрузятся) -->
        <div id="error" class="error" style="display: none; color: red; text-align: center; padding: 20px;">
            Ошибка загрузки данных
        </div>
    </div>

    <!-- Подключение основного скрипта -->
    <script src="script.js"></script>
</body>
</html>
