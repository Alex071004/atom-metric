name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Create output directory
        run: mkdir -p output
      
      - name: Generate static site
        run: |
          python -m app.static_builder
      
      - name: Debug - show output directory
        run: |
          echo "=== СОДЕРЖИМОЕ output ==="
          ls -la output/
          echo "=== ПРОВЕРКА index.html ==="
          if [ -f output/index.html ]; then
            echo "✅ index.html существует"
            echo "--- Первые 10 строк ---"
            head -10 output/index.html
          else
            echo "❌ index.html НЕ НАЙДЕН"
            exit 1
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
