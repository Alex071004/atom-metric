name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Create output directory
        run: mkdir -p output  # <-- ВАЖНО: создаем папку
      
      - name: Generate static site
        run: |
          python -m app.static_builder
      
      - name: Copy frontend files (if not copied by builder)
        run: |
          cp -r frontend/* output/ 2>/dev/null || echo "Frontend files already there"
      
      - name: List output directory (debug)
        run: ls -la output/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'  # теперь папка точно существует

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
